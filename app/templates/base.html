<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Clover v2{% endblock %}</title>
<script>
  // resolve theme before paint (no flash): saved choice, else match the OS
  (function () {
    try {
      var t = localStorage.getItem("clover_theme");
      if (t !== "light" && t !== "dark")
        t = (window.matchMedia && matchMedia("(prefers-color-scheme: light)").matches) ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", t);
    } catch (e) { document.documentElement.setAttribute("data-theme", "dark"); }
  })();
</script>
<style>
  :root, :root[data-theme="dark"]{
    --bg:#0b1110; --bg2:#0e1714; --card:#12201b; --card2:#152721; --line:#1f3a30;
    --ink:#dcefe2; --sub:#7fa594; --dim:#5c7f70;
    --clover:#34d27b; --clover-d:#13632f; --cyan:#2bd4c4; --amber:#f0b24a; --red:#ff6b5e;
    --input-bg:#0c1512; --tile-bg:#0c1813; --track-bg:#0a1410; --th-bg:#0e1a16; --code-bg:#0c1512;
    --header-bg:rgba(8,14,12,.72); --shadow:rgba(0,0,0,.28); --btn-ink:#06140d;
    --log-bg:#060b09; --log-ink:#9fdcb8;
    --body-grad:radial-gradient(1200px 600px at 70% -10%,#10211b 0%,var(--bg) 55%);
    --mono:ui-monospace,"Cascadia Code",Consolas,"SF Mono",monospace;   /* theme-independent */
  }
  :root[data-theme="light"]{
    --bg:#eef2f0; --bg2:#f5f9f7; --card:#ffffff; --card2:#f6faf8; --line:#d7e2dc;
    --ink:#15211b; --sub:#51695d; --dim:#90a89b;
    --clover:#1f8a4c; --clover-d:#0f5e30; --cyan:#138f82; --amber:#b07514; --red:#c0392b;
    --input-bg:#ffffff; --tile-bg:#f3f7f4; --track-bg:#e6eee9; --th-bg:#eef3f0; --code-bg:#eef3f0;
    --header-bg:rgba(255,255,255,.85); --shadow:rgba(20,40,30,.08); --btn-ink:#ffffff;
    --log-bg:#0c1612; --log-ink:#bfe8cf;          /* console stays dark in both themes */
    --body-grad:radial-gradient(1100px 560px at 75% -12%,#ffffff 0%,var(--bg) 62%);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--body-grad);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.55;min-height:100vh}
  header{display:flex;gap:18px;align-items:center;padding:13px 24px;border-bottom:1px solid var(--line);
    background:var(--header-bg);backdrop-filter:blur(6px);position:sticky;top:0;z-index:5}
  header .logo{font-weight:700;letter-spacing:.06em;color:var(--ink)}
  header .logo .v{color:var(--clover)}
  header a{color:var(--sub);text-decoration:none;font-size:14px}
  header a:hover{color:var(--ink)}
  header a.active{color:var(--clover);font-weight:600}
  .mainnav{display:flex;gap:18px;align-items:center;flex-wrap:wrap}
  /* per-tab sub-navigation (folds the old separate pages under their parent tab) */
  .subnav{display:flex;gap:6px;margin:0 0 18px;flex-wrap:wrap}
  .subnav a{font-size:13px;color:var(--sub);text-decoration:none;padding:5px 13px;border:1px solid var(--line);
    border-radius:18px;background:var(--card2)}
  .subnav a:hover{color:var(--ink);border-color:var(--clover)}
  .subnav a.on{color:var(--clover-d);border-color:var(--clover);background:rgba(52,210,123,.12);font-weight:600}
  header .right{margin-left:auto;font-size:11px;letter-spacing:.12em;color:var(--dim);text-transform:uppercase}
  .themetoggle{background:transparent;border:1px solid var(--line);color:var(--ink);border-radius:8px;
    padding:4px 9px;font-size:14px;line-height:1;cursor:pointer}
  .themetoggle:hover{border-color:var(--clover)}
  main{max-width:1000px;margin:0 auto;padding:26px 24px 70px}
  h1{font-size:22px;margin:0 0 4px;letter-spacing:.01em}
  h2{font-size:13px;margin:0 0 12px;text-transform:uppercase;letter-spacing:.12em;color:var(--sub)}
  /* reusable hover-help: <span class="help" data-tip="...">?</span> */
  .help{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;
    border:1px solid var(--line);color:var(--sub);font-size:10px;font-weight:700;cursor:help;position:relative;vertical-align:middle}
  .help:hover{color:var(--ink);border-color:var(--clover)}
  .help::after{content:attr(data-tip);position:absolute;left:50%;bottom:150%;transform:translateX(-50%);
    width:max-content;max-width:280px;white-space:normal;text-align:left;background:var(--card2);color:var(--ink);
    border:1px solid var(--line);border-radius:8px;padding:8px 11px;font-size:12px;font-weight:400;
    text-transform:none;letter-spacing:0;line-height:1.45;box-shadow:0 6px 20px rgba(0,0,0,.32);
    opacity:0;visibility:hidden;transition:opacity .12s;z-index:90}
  .help:hover::after{opacity:1;visibility:visible}
  .card{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--line);
    border-radius:14px;padding:20px 22px;margin-top:16px;box-shadow:0 8px 30px var(--shadow)}
  label{display:block;font-size:11px;color:var(--sub);text-transform:uppercase;letter-spacing:.08em;margin:12px 0 4px}
  input,select{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;font-size:14px;
    background:var(--input-bg);color:var(--ink)}
  input:focus,select:focus{outline:none;border-color:var(--clover);box-shadow:0 0 0 3px rgba(52,210,123,.15)}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .row3{display:grid;grid-template-columns:2fr 1fr 1fr;gap:14px}
  button,.btn{background:var(--clover);color:var(--btn-ink);border:0;border-radius:8px;padding:10px 18px;font-size:14px;
    font-weight:700;cursor:pointer;letter-spacing:.01em}
  button:hover,.btn:hover{filter:brightness(1.07)}
  button.ghost{background:transparent;color:var(--clover);border:1px solid var(--clover)}
  button.ghost:hover{background:rgba(52,210,123,.1);filter:none}
  button:disabled,.btn.disabled{opacity:.45;cursor:not-allowed;filter:none}
  .msg{margin-top:10px;font-size:13px;padding:8px 12px;border-radius:8px;display:none;border:1px solid transparent}
  .msg.ok{display:block;background:rgba(52,210,123,.12);color:var(--clover-d);border-color:rgba(52,210,123,.32)}
  .msg.err{display:block;background:rgba(255,107,94,.1);color:var(--red);border-color:rgba(255,107,94,.35)}
  table{width:100%;border-collapse:collapse;font-size:13px;margin-top:10px}
  th,td{border:1px solid var(--line);padding:8px 10px;text-align:left}
  th{background:var(--th-bg);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--sub)}
  td a{color:var(--clover-d)}
  .colemail{text-align:right}            /* email column right-aligned (GreenBook / project people) */
  .note{font-size:12px;color:var(--sub)} .dim{color:var(--dim)}
  code{background:var(--code-bg);border:1px solid var(--line);padding:1px 6px;border-radius:5px;
    font-family:ui-monospace,Consolas,monospace;font-size:12.5px;color:var(--cyan)}
  .folders{display:grid;grid-template-columns:repeat(2,1fr);gap:7px 20px;margin-top:8px}
  .folders label{display:flex;gap:9px;align-items:center;text-transform:none;letter-spacing:0;font-size:14px;color:var(--ink);margin:0}
  .folders input{width:auto;accent-color:var(--clover)}
  pre.log{background:var(--log-bg);color:var(--log-ink);border:1px solid var(--line);border-radius:10px;padding:13px;
    font-family:ui-monospace,Consolas,monospace;font-size:12px;max-height:260px;overflow:auto;white-space:pre-wrap;margin-top:12px}
  .pill{font-size:11px;font-weight:700;border-radius:20px;padding:4px 11px;letter-spacing:.04em;white-space:nowrap}
  .pill.up{background:rgba(52,210,123,.16);color:var(--clover-d);border:1px solid rgba(52,210,123,.4)}
  .pill.down{background:rgba(240,178,74,.14);color:var(--amber);border:1px solid rgba(240,178,74,.34)}
  @keyframes cloverspin{to{transform:rotate(360deg)}}
  .clover-spin{display:inline-block;animation:cloverspin 1.1s linear infinite;transform-origin:50% 50%}
  .mono{font-family:ui-monospace,Consolas,monospace}   /* global so Mail pages get it too */
  /* shared list rows + classification badges (Mail / Projects / Contacts) */
  .thlist{display:flex;flex-direction:column;gap:6px}
  .throw{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;padding:11px 13px;
    border:1px solid var(--line);border-radius:9px;background:var(--card2);text-decoration:none;color:var(--ink)}
  .throw:hover{border-color:var(--clover)}
  .thmain{min-width:0;flex:1}
  .thsubj{display:block;font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  /* the AI summary is the real scanning aid — let it breathe to two lines instead of clipping like the subject */
  .thmeta{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;font-size:12.5px;line-height:1.4}
  .thside{flex:none;display:flex;flex-direction:column;gap:3px;align-items:flex-end}
  .thn{font-size:11px;font-weight:700;color:var(--clover-d);background:rgba(52,210,123,.14);border-radius:20px;padding:2px 9px}
  .cbadges{display:inline-flex;gap:5px;flex-wrap:wrap;margin-top:3px}
  .cbadge{font-size:10px;font-weight:700;border:1px solid var(--line);border-radius:5px;padding:1px 7px;color:var(--sub)}
  .cbadge.dom{background:rgba(52,210,123,.14);color:var(--clover-d);border-color:rgba(52,210,123,.3)}
  .cbadge.warn{background:rgba(240,178,74,.16);color:var(--amber);border-color:rgba(240,178,74,.34)}   /* review = human action (amber, loud) */
  .cbadge.stale{background:var(--card2);color:var(--sub);border-color:var(--line);font-weight:600}     /* out-of-date = machine action (quiet, distinct from review) */
  .cbadge.proj{background:rgba(43,212,196,.12);color:var(--cyan);border-color:rgba(43,212,196,.3)}
  .cbadge.pend{background:none;color:var(--dim);border-style:dashed}                                   /* uncomprehended: 'awaiting AI' */
  .leaf{font-size:14px;line-height:1}
  .leaf.ghost{opacity:.4}                                                                              /* hollow lead glyph for not-yet-comprehended rows */
  .leaf.stale{filter:sepia(1) saturate(2.4) hue-rotate(-28deg) brightness(.82)}   /* green clover → brown = comprehension out of date */
  /* one coherent inline-SVG icon set (themeable via currentColor) — replaces the grab-bag of emoji glyphs */
  .ic{width:1.05em;height:1.05em;vertical-align:-.16em;fill:none;stroke:currentColor;stroke-width:2;
    stroke-linecap:round;stroke-linejoin:round;flex:none}
  .ic.lg{width:1.25em;height:1.25em}
  button .ic,.btn .ic,.linkbtn .ic{vertical-align:-.18em;margin-right:5px}
  button .ic:only-child,.linkbtn .ic:only-child{margin-right:0}
  /* secondary per-row indicators (attachment / link) — small + muted so only 🍀 + the subject lead */
  .thicons{display:inline-flex;gap:7px;align-items:center;color:var(--dim);font-size:12px}
  .thicons .ic{width:14px;height:14px;vertical-align:middle}
  .ic.on{color:var(--clover)}    /* link downloaded */
  .ic.wait{color:var(--amber)}   /* link still to fetch */
  .ic-clover{width:1em;height:1em;fill:currentColor;display:inline-block;vertical-align:-.18em}
  .linkbtn{background:none;border:0;color:var(--clover);font:inherit;font-weight:600;padding:0;cursor:pointer}
  .linkbtn:hover{text-decoration:underline;filter:none;background:none}
  .runhdr{display:flex;align-items:center;gap:12px;justify-content:space-between}   /* page title + action */
  /* visible keyboard focus for every interactive element */
  a:focus-visible,button:focus-visible,input:focus-visible,select:focus-visible,summary:focus-visible,
  [tabindex]:focus-visible,.help:focus-visible{outline:2px solid var(--clover);outline-offset:2px}
  /* hover-help also opens on keyboard focus; clamp width on small screens */
  .help::after{max-width:min(280px,92vw)}
  .help:focus-visible::after,.help:focus::after{opacity:1;visibility:visible}
  /* long URLs / ids never force horizontal page scroll */
  code,.note,td{overflow-wrap:anywhere}
  .tablewrap{overflow-x:auto}
  /* mobile */
  .skip{position:absolute;left:8px;top:-48px;z-index:200;background:var(--clover);color:var(--btn-ink);
    padding:8px 14px;border-radius:8px;font-size:13px;font-weight:700;transition:top .12s}
  .skip:focus{top:8px}
  @media (max-width:640px){
    header{flex-wrap:wrap;gap:10px 14px;padding:11px 15px}
    header .right{display:none}
    main{padding:18px 14px 60px}
    .row,.row3,.folders{grid-template-columns:1fr}
    table{display:block;overflow-x:auto;white-space:nowrap}
    button,.btn{min-height:42px}            /* comfortable touch targets */
    .help{width:20px;height:20px}
    .scrollnav button{width:44px;height:44px}
    .runhdr{flex-direction:column;align-items:flex-start;gap:8px}
    /* conversation rows reflow: side meta drops under the content, subject/summary get full width */
    .throw{flex-direction:column;align-items:stretch;gap:6px}
    .thside{flex-direction:row;align-items:center;gap:10px;flex-wrap:wrap}
    .thsubj{white-space:normal}
  }
</style>
</head>
<body>
<a href="#main" class="skip">Skip to main content</a>
<svg width="0" height="0" style="position:absolute" aria-hidden="true" focusable="false"><defs>
  <symbol id="ic-refresh" viewBox="0 0 24 24"><path d="M20 11.5a8 8 0 1 0-.9 4.2"/><path d="M20 4.5v5h-5"/></symbol>
  <symbol id="ic-sync" viewBox="0 0 24 24"><path d="M4.5 11a7.5 7.5 0 0 1 12.8-4.3M19.5 13a7.5 7.5 0 0 1-12.8 4.3"/><path d="M17.5 3v3.5H14M6.5 21v-3.5H10"/></symbol>
  <symbol id="ic-download" viewBox="0 0 24 24"><path d="M12 3.5v10.5M7.5 10l4.5 4.5L16.5 10M5 20h14"/></symbol>
  <symbol id="ic-stop" viewBox="0 0 24 24"><rect x="6.5" y="6.5" width="11" height="11" rx="2.5"/></symbol>
  <symbol id="ic-filter" viewBox="0 0 24 24"><path d="M3.5 5h17l-6.7 8.1V20l-3.6-2v-4.9z"/></symbol>
  <symbol id="ic-gear" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.2"/><path d="M12 2.6v3.2M12 18.2v3.2M2.6 12h3.2M18.2 12h3.2M5.1 5.1l2.3 2.3M16.6 16.6l2.3 2.3M18.9 5.1l-2.3 2.3M7.4 16.6l-2.3 2.3"/></symbol>
  <symbol id="ic-merge" viewBox="0 0 24 24"><path d="M6 4l6 7 6-7M12 11v8M8.8 15.8l3.2 3.2 3.2-3.2"/></symbol>
  <symbol id="ic-link" viewBox="0 0 24 24"><path d="M9.3 14.7l5.4-5.4M8.3 11.2l-1.8 1.8a3.3 3.3 0 0 0 4.7 4.7l1.8-1.8M15.7 12.8l1.8-1.8a3.3 3.3 0 0 0-4.7-4.7l-1.8 1.8"/></symbol>
  <symbol id="ic-link-check" viewBox="0 0 24 24"><path d="M10 12l4-4M8.4 10.4l-1.9 1.9a3.1 3.1 0 0 0 4.4 4.4M13.6 13.6l1.9-1.9a3.1 3.1 0 0 0-4.4-4.4"/><path d="M14 18.5l2 2 4-4.5"/></symbol>
  <symbol id="ic-edit" viewBox="0 0 24 24"><path d="M14.5 5.5l4 4M4 20l1-4.2L15.8 5l3.2 3.2L8.2 19z"/></symbol>
  <symbol id="ic-check" viewBox="0 0 24 24"><path d="M5 12.5l4.5 4.5L19 7"/></symbol>
  <symbol id="ic-paperclip" viewBox="0 0 24 24"><path d="M19.5 11.5l-7.7 7.7a5 5 0 0 1-7-7l7.7-7.7a3.3 3.3 0 0 1 4.7 4.7l-7.5 7.5a1.6 1.6 0 0 1-2.3-2.3l6.8-6.8"/></symbol>
  <symbol id="ic-mail" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2.5"/><path d="M4 7l8 6 8-6"/></symbol>
  <symbol id="ic-reply" viewBox="0 0 24 24"><path d="M9 7L4 12l5 5M4 12h9a6 6 0 0 1 6 6v1"/></symbol>
  <symbol id="ic-forward" viewBox="0 0 24 24"><path d="M15 7l5 5-5 5M20 12h-9a6 6 0 0 0-6 6v1"/></symbol>
  <symbol id="ic-flag" viewBox="0 0 24 24"><path d="M6 21V4M6 4.5h11l-2.4 3.5L17 11.5H6"/></symbol>
  <symbol id="ic-clover" viewBox="0 0 24 24"><g><path d="M11.2 11.2C11.2 8 9.6 4.8 7 4.8 5.2 4.8 3.8 6.2 3.8 8c0 2.6 3.2 4.2 6.4 4.2.5 0 1-.4 1-1z"/><path d="M12.8 11.2C12.8 8 14.4 4.8 17 4.8c1.8 0 3.2 1.4 3.2 3.2 0 2.6-3.2 4.2-6.4 4.2-.5 0-1-.4-1-1z"/><path d="M11.2 12.8C11.2 16 9.6 19.2 7 19.2c-1.8 0-3.2-1.4-3.2-3.2 0-2.6 3.2-4.2 6.4-4.2.5 0 1 .4 1 1z"/><path d="M12.8 12.8C12.8 16 14.4 19.2 17 19.2c1.8 0 3.2-1.4 3.2-3.2 0-2.6-3.2-4.2-6.4-4.2-.5 0-1 .4-1 1z"/></g></symbol>
  <symbol id="ic-scale" viewBox="0 0 24 24"><path d="M12 4v16M6 7h12M6 7l-3 6h6zM18 7l-3 6h6zM3 13a3 3 0 0 0 6 0M15 13a3 3 0 0 0 6 0M8 20h8"/></symbol>
</defs></svg>
<header>
  <span class="logo">🍀 Clover<span class="v"> v2</span></span>
  <nav class="mainnav" aria-label="Main">
    <a href="/threads" class="{% block nav_mail %}{% endblock %}">Mail</a>
    <a href="/projects" class="{% block nav_hub %}{% endblock %}">Hub</a>
    <a href="/todo" class="{% block nav_matters %}{% endblock %}">Matters</a>
    <a href="/contacts" class="{% block nav_rolodex %}{% endblock %}">Rolodex</a>
  </nav>
  <button id="themeBtn" class="themetoggle" type="button" style="margin-left:auto" onclick="toggleTheme()" aria-label="Toggle light/dark theme" title="Toggle light / dark theme">☀️</button>
</header>
<main id="main">{% block body %}{% endblock %}</main>
<script>
  function setThemeIcon(){
    var light = document.documentElement.getAttribute("data-theme") === "light";
    var b = document.getElementById("themeBtn");
    if (b){
      b.textContent = light ? "🌙" : "☀️";                 // icon = the mode you'll switch TO
      b.setAttribute("aria-pressed", light ? "true" : "false");
      b.setAttribute("aria-label", light ? "Switch to dark theme" : "Switch to light theme");
    }
  }
  function toggleTheme(){
    var next = (document.documentElement.getAttribute("data-theme") === "light") ? "dark" : "light";
    document.documentElement.setAttribute("data-theme", next);
    try { localStorage.setItem("clover_theme", next); } catch (e) {}
    setThemeIcon();
  }
  setThemeIcon();
  document.querySelectorAll(".mainnav a.active").forEach(a => a.setAttribute("aria-current", "page"));
</script>
</body>
</html>
