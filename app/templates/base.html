<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Clover v2{% endblock %}</title>
<style>
  :root{--ink:#16201a;--sub:#4d5a52;--line:#c9d4cc;--paper:#f7f9f7;--card:#fff;
        --clover:#1f8a4c;--clover-d:#13632f;--red:#b23a2e;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.5}
  header{background:var(--clover-d);color:#fff;padding:12px 22px;display:flex;gap:18px;align-items:center}
  header .logo{font-weight:700;letter-spacing:.04em}
  header a{color:#dff3e6;text-decoration:none;font-size:14px}
  header a.active{color:#fff;font-weight:600;border-bottom:2px solid #fff;padding-bottom:2px}
  main{max-width:920px;margin:0 auto;padding:24px 22px 60px}
  h1{font-size:21px;margin:0 0 4px} h2{font-size:15px;margin:20px 0 8px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:18px;margin-top:14px}
  label{display:block;font-size:12px;color:var(--sub);text-transform:uppercase;letter-spacing:.04em;margin:10px 0 3px}
  input,select{width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:6px;font-size:14px;background:#fff}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .row3{display:grid;grid-template-columns:2fr 1fr 1fr;gap:14px}
  button{background:var(--clover);color:#fff;border:0;border-radius:6px;padding:9px 16px;font-size:14px;font-weight:600;cursor:pointer}
  button.ghost{background:#fff;color:var(--clover-d);border:1px solid var(--clover)}
  button:disabled{opacity:.5;cursor:not-allowed}
  .msg{margin-top:8px;font-size:13px;padding:7px 10px;border-radius:6px;display:none}
  .msg.ok{display:block;background:#eaf6ee;color:var(--clover-d)}
  .msg.err{display:block;background:#fbecea;color:var(--red)}
  table{width:100%;border-collapse:collapse;font-size:13px;margin-top:10px}
  th,td{border:1px solid var(--line);padding:7px 9px;text-align:left}
  th{background:#eef3ef;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--sub)}
  .folders{display:grid;grid-template-columns:repeat(2,1fr);gap:6px 18px;margin-top:8px}
  .folders label{display:flex;gap:8px;align-items:center;text-transform:none;letter-spacing:0;font-size:14px;color:var(--ink);margin:0}
  .folders input{width:auto}
  .note{font-size:12px;color:var(--sub)} code{background:#eef3ef;padding:1px 5px;border-radius:4px}
  pre.log{background:#0e1512;color:#cfe9d8;border-radius:6px;padding:12px;font-size:12px;max-height:300px;overflow:auto;white-space:pre-wrap}
</style>
</head>
<body>
<header>
  <span class="logo">🍀 Clover v2</span>
  <a href="/setup" class="{% block nav_setup %}{% endblock %}">Setup</a>
  <a href="/archive" class="{% block nav_archive %}{% endblock %}">Archive (Phase 1)</a>
  <span style="margin-left:auto;font-size:12px;opacity:.8">.eml archiver</span>
</header>
<main>{% block body %}{% endblock %}</main>
</body>
</html>
